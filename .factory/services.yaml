commands:
  install: uv sync
  install_rocm: uv sync --extra rocm --index-url https://download.pytorch.org/whl/rocm6.2
  install_cuda: uv sync --extra cuda --index-url https://download.pytorch.org/whl/cu124
  typecheck: ty check
  lint: ruff check .
  format_check: ruff format --check .
  format: ruff format .
  test: uv run pytest -v

services: {}
